<div class="container">
  <form [formGroup]="loginForm" class="login-form" (ngSubmit)="onSubmit()">
    <div class="form-header">
      <h1>Welcome</h1>
      <p>Login to continue</p>
    </div>

    <label for="userName">Username</label>
    <input id="userName" type="text" formControlName="userName" required placeholder="Enter your username" />
    <label for="password">Password</label>
    <input id="password" type="password" formControlName="password" required placeholder="Enter your password" />
    <button type="submit" [disabled]="!loginForm.valid">Submit</button>

  </form>
</div>
